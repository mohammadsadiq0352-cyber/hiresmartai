<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireSmart - Company Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a !important;
            background-image:
                radial-gradient(ellipse 70% 50% at 15% 5%, rgba(99, 102, 241, 0.2) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px) !important;
            background-size: auto, auto, 50px 50px, 50px 50px !important;
        }

        .top-header {
            background: rgba(15, 23, 42, 0.9) !important;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
        }

        .logo-section { color: #a5b4fc !important; }

        .profile-hero, .profile-card {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(12px);
        }

        .hero-info h1, .info-value { color: #f1f5f9 !important; }
        .card-title { color: #94a3b8 !important; }
        .info-label { color: #64748b !important; }

        .info-input {
            background: rgba(255,255,255,0.06) !important;
            border-color: rgba(255,255,255,0.1) !important;
            color: #f1f5f9 !important;
        }

        .info-input::placeholder { color: #475569 !important; }

        .info-input:focus {
            background: rgba(255,255,255,0.1) !important;
            border-color: #6366f1 !important;
        }

        .info-input[readonly] {
            background: rgba(255,255,255,0.03) !important;
            color: #64748b !important;
        }

        .stat-box {
            background: rgba(99, 102, 241, 0.15) !important;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .stat-box .stat-num { color: #a5b4fc !important; }
        .stat-box .stat-label { color: #94a3b8 !important; }

        .company-tag {
            background: rgba(99, 102, 241, 0.2) !important;
            color: #a5b4fc !important;
        }

        .hero-info .email-tag { color: #94a3b8 !important; }
        .btn-back { color: #94a3b8 !important; }
        .btn-back:hover { color: #a5b4fc !important; }

        .profile-dropdown {
            background: #1e293b !important;
            border-color: rgba(255,255,255,0.1) !important;
        }

        .dropdown-item { color: #cbd5e1 !important; }
        .dropdown-item:hover { background: rgba(255,255,255,0.05) !important; color: #a5b4fc !important; }
        .dropdown-item.logout { color: #f87171 !important; border-top-color: rgba(255,255,255,0.07) !important; }
        .dropdown-item.logout:hover { background: rgba(239,68,68,0.1) !important; }

        .profile-dropdown::before { background: #1e293b !important; border-color: rgba(255,255,255,0.1) !important; }

        .profile-page {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        .profile-hero {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-premium);
            display: flex;
            align-items: center;
            gap: 36px;
            margin-bottom: 28px;
            border: 1px solid var(--glass-border);
        }

        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .avatar-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-light);
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: var(--primary);
        }

        .avatar-edit-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            background: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .avatar-edit-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.1);
        }

        .hero-info h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .hero-info .company-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .hero-info .email-tag {
            color: var(--text-muted);
            font-size: 14px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow-premium);
            border: 1px solid var(--glass-border);
        }

        .profile-card.full-width {
            grid-column: 1 / -1;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 18px;
        }

        .info-row:last-child { margin-bottom: 0; }

        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .info-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-main);
            transition: border-color 0.2s;
            background: #f8fafc;
        }

        .info-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .info-input[readonly] {
            background: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-box {
            background: var(--primary-light);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        .stat-box .stat-num {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-box .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 4px;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
        }

        .btn-save:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0;
        }

        .btn-back:hover { color: var(--primary); }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            color: white;
            padding: 14px 22px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .profile-hero { flex-direction: column; text-align: center; }
            .profile-grid { grid-template-columns: 1fr; }
            .stat-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="logo-section">
            <span style="font-size: 24px;">🎯</span>
            <span>HireSmart - HR Portal</span>
        </div>
        <div class="profile-container">
            <div class="user-init" id="user-initial">HR</div>
            <div class="profile-dropdown">
                <div class="dropdown-item" onclick="window.location.href='hr-dashboard.html'">
                    <span>🏠</span> Dashboard
                </div>
                <div class="dropdown-item logout" onclick="logout()">
                    <span>🚪</span> Logout
                </div>
            </div>
        </div>
    </header>

    <div class="profile-page">
        <button class="btn-back" onclick="window.location.href='hr-dashboard.html'">← Back to Dashboard</button>

        <!-- Hero Section -->
        <div class="profile-hero">
            <div class="avatar-wrapper">
                <div class="avatar-img" id="avatar-display">HR</div>
                <div class="avatar-edit-btn" onclick="document.getElementById('photo-input').click()" title="Change photo">✏️</div>
                <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
            </div>
            <div class="hero-info">
                <h1 id="hero-name">Loading...</h1>
                <div class="company-tag">🏢 <span id="hero-company">Company</span></div>
                <div class="email-tag" id="hero-email">email@company.com</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="profile-card full-width" style="margin-bottom: 24px;">
            <div class="card-title">📊 Activity Overview</div>
            <div class="stat-grid" style="grid-template-columns: 1fr;">
                <div class="stat-box">
                    <div class="stat-num" id="stat-joined">—</div>
                    <div class="stat-label">Member Since</div>
                </div>
            </div>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'http://localhost:5000';

        function showToast(msg, success = true) {
            const t = document.getElementById('toast');
            t.textContent = (success ? '✅ ' : '❌ ') + msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function logout() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            localStorage.clear();
            window.location.href = user.role === 'hr' ? 'auth.html?role=hr' : 'auth.html?role=user';
        }

        function loadProfile() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.email) { window.location.href = 'auth.html?role=hr'; return; }

            const initial = (user.name || 'HR')[0].toUpperCase();
            document.getElementById('user-initial').textContent = initial;
            document.getElementById('hero-name').textContent = user.name || 'HR Recruiter';
            document.getElementById('hero-company').textContent = user.companyName || 'Your Company';
            document.getElementById('hero-email').textContent = user.email;

            const savedPhoto = localStorage.getItem('profilePhoto');
            if (savedPhoto) {
                setAvatarImage(savedPhoto);
            } else {
                document.getElementById('avatar-display').textContent = initial;
            }

            loadStats(user.email);
        }

        async function loadStats(email) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.id) {
                const date = new Date(user.id);
                document.getElementById('stat-joined').textContent = date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            }
        }

        function setAvatarImage(src) {
            const el = document.getElementById('avatar-display');
            el.innerHTML = `<img src="${src}" style="width:110px;height:110px;border-radius:50%;object-fit:cover;" alt="Profile photo">`;
        }

        function handlePhotoUpload(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showToast('Image must be under 2MB', false);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem('profilePhoto', dataUrl);
                setAvatarImage(dataUrl);
                showToast('Profile photo updated');
            };
            reader.readAsDataURL(file);
        }

        function saveProfile() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            user.name = document.getElementById('field-name').value.trim();
            user.companyName = document.getElementById('field-company').value.trim();
            localStorage.setItem('user', JSON.stringify(user));

            const extra = {
                industry: document.getElementById('field-industry').value.trim(),
                location: document.getElementById('field-location').value.trim(),
                bio: document.getElementById('field-bio').value.trim()
            };
            localStorage.setItem('hrProfile', JSON.stringify(extra));

            // Update hero display
            document.getElementById('hero-name').textContent = user.name || 'HR Recruiter';
            document.getElementById('hero-company').textContent = user.companyName || 'Your Company';
            document.getElementById('user-initial').textContent = (user.name || 'HR')[0].toUpperCase();

            showToast('Profile saved successfully');
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
