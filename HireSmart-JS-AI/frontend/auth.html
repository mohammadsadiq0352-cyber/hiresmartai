<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireSmart - Authentication</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async></script>    <style>
        :root {
            --auth-primary: #4f46e5;
            --auth-primary-hover: #4338ca;
            --auth-hr: #7c3aed;
            --auth-hr-hover: #6d28d9;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background: #0f172a;
            position: relative;
            font-family: 'Inter', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139,92,246,0.2) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 60% 30%, rgba(59,130,246,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Branding above card */
        .brand-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-logo {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            color: #f1f5f9;
            letter-spacing: -0.3px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Card */
        .auth-container {
            position: relative;
            z-index: 1;
            max-width: 440px;
            width: 90%;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.12);
            animation: slideUp 0.5s ease-out;
            margin-bottom: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Role badge */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
            background: rgba(79,70,229,0.2);
            color: #a5b4fc;
            border: 1px solid rgba(79,70,229,0.3);
            transition: all 0.3s;
        }

        .role-badge.hr-badge {
            background: rgba(124,58,237,0.2);
            color: #c4b5fd;
            border-color: rgba(124,58,237,0.3);
        }

        /* Title area */
        .typing-container {
            text-align: center;
            margin-bottom: 24px;
        }

        #auth-title {
            font-size: 28px;
            font-weight: 800;
            color: #f1f5f9;
            margin: 0 0 6px;
            letter-spacing: -0.5px;
        }

        #auth-subtitle {
            font-size: 15px;
            color: #94a3b8;
            margin: 0;
        }

        /* Role selector */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 22px;
        }

        .role-option {
            border: 2px solid rgba(255,255,255,0.1);
            padding: 14px 10px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 600;
            font-size: 14px;
            background: rgba(255,255,255,0.04);
            color: #94a3b8;
        }

        .role-option .role-icon { display: block; font-size: 20px; margin-bottom: 4px; }

        .role-option:hover {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
        }

        .role-option.active {
            border-color: var(--auth-primary);
            background: rgba(79,70,229,0.18);
            color: #a5b4fc;
            box-shadow: 0 4px 12px rgba(79,70,229,0.2);
        }

        .role-option.active.hr-active {
            border-color: var(--auth-hr);
            background: rgba(124,58,237,0.18);
            color: #c4b5fd;
            box-shadow: 0 4px 12px rgba(124,58,237,0.2);
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 13px;
        }

        .input-wrap {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 15px;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
            background: rgba(255,255,255,0.07);
            color: #f1f5f9;
            box-sizing: border-box;
        }

        .form-group input::placeholder { color: #475569; }

        /* Kill browser autofill white background */
        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #1e2a3a inset !important;
            -webkit-text-fill-color: #f1f5f9 !important;
            border-color: rgba(255,255,255,0.1) !important;
            caret-color: #f1f5f9;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--auth-primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
            background: rgba(255,255,255,0.1);
        }

        .body-hr .form-group input:focus {
            border-color: var(--auth-hr);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }

        /* Password toggle */
        .pw-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            line-height: 1;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pw-toggle:hover { color: #94a3b8; }
        .pw-toggle svg { pointer-events: none; }

        .form-group input.has-toggle { padding-right: 46px; }

        /* Hide browser native password reveal icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear,
        input[type="password"]::-webkit-contacts-auto-fill-button,
        input[type="password"]::-webkit-credentials-auto-fill-button { display: none !important; }

        /* Error message */
        .error-msg {
            display: none;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .error-msg.show { display: block; }

        /* Forgot password */
        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 18px;
        }

        .forgot-link a {
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-link a:hover { color: #a5b4fc; }

        /* Social login */
        .social-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
            color: #475569;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 4px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            color: #f1f5f9;
        }

        /* Submit button */
        .auth-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            background: var(--auth-primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
            box-shadow: 0 8px 20px -4px rgba(79,70,229,0.4);
        }

        .auth-btn:hover {
            background: var(--auth-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -4px rgba(79,70,229,0.5);
        }

        .auth-btn.hr-btn {
            background: var(--auth-hr);
            box-shadow: 0 8px 20px -4px rgba(124,58,237,0.4);
        }

        .auth-btn.hr-btn:hover {
            background: var(--auth-hr-hover);
            box-shadow: 0 12px 24px -4px rgba(124,58,237,0.5);
        }

        /* Switch mode */
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
        }

        .switch-link {
            color: #a5b4fc;
            cursor: pointer;
            font-weight: 700;
            margin-left: 4px;
            text-decoration: none;
        }

        .switch-link:hover { text-decoration: underline; }

        /* Back to home */
        .back-home {
            position: relative;
            z-index: 1;
            margin-top: 4px;
        }

        .back-home a {
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-home a:hover { color: #94a3b8; }

        /* Divider */
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <!-- Branding -->
    <div class="brand-header">
        <div class="brand-logo">🎯</div>
        <div class="brand-title">HireSmart</div>
        <div class="brand-subtitle">AI Based Resume Screening System</div>
    </div>

    <!-- Auth Card -->
    <div class="auth-container">

        <!-- Role badge -->
        <div style="text-align:center;">
            <span class="role-badge" id="role-badge">👤 Candidate Login</span>
        </div>

        <!-- Title -->
        <div class="typing-container">
            <h2 id="auth-title">Welcome</h2>
            <p id="auth-subtitle">Sign in to your account</p>
        </div>

        <!-- Error area -->
        <div class="error-msg" id="error-msg">⚠️ <span id="error-text">Invalid email or password.</span></div>

        <form id="auth-form" novalidate>
            <!-- Signup-only fields -->
            <div id="registration-fields" style="display:none;">
                <div class="form-group">
                    <label>Full Name <span style="color:#f87171;">*</span></label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
                <div class="form-group" id="company-field" style="display:none;">
                    <label>Company Name <span style="color:#f87171;">*</span></label>
                    <input type="text" id="company" placeholder="HireSmart Inc.">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address <span style="color:#f87171;">*</span></label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>

            <!-- Company name for HR login only -->
            <div class="form-group" id="login-company-field" style="display:none;">
                <label>Company Name <span style="color:#f87171;">*</span></label>
                <input type="text" id="login-company" placeholder="Your company name">
            </div>

            <div class="form-group">
                <label>Password <span style="color:#f87171;">*</span></label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••" class="has-toggle" required>
                    <button type="button" class="pw-toggle" data-field="password" aria-label="Show password">👁️</button>
                </div>
            </div>

            <!-- Forgot password (login only) -->
            <div class="forgot-link" id="forgot-wrap">
                <a href="forgot-pwd.html" id="forgot-link-anchor">Forgot password?</a>
            </div>

            <div class="form-group" id="confirm-password-group" style="display:none;">
                <label>Confirm Password <span style="color:#f87171;">*</span></label>
                <div class="input-wrap">
                    <input type="password" id="confirm-password" placeholder="••••••••" class="has-toggle">
                    <button type="button" class="pw-toggle" data-field="confirm-password" aria-label="Show password">👁️</button>
                </div>
            </div>

            <!-- Role selector -->
            <div class="form-group" id="role-selection-group">
                <label id="role-selector-label" style="display:none;">I am a...</label>
                <div class="role-selector">
                    <div class="role-option active" id="role-candidate" onclick="setRole('user')">
                        <span class="role-icon">🎓</span>Candidate
                    </div>
                    <div class="role-option" id="role-hr" onclick="setRole('hr')">
                        <span class="role-icon">🏢</span>Company
                    </div>
                </div>
            </div>

            <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
        </form>

        <!-- Divider -->
        <div class="social-divider"><span>or continue with</span></div>

        <!-- Social buttons (candidate) -->
        <div class="social-btns" id="social-candidate">
            <a class="social-btn" href="#" onclick="socialLogin('google','user')">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Google
            </a>
            <a class="social-btn" href="#" onclick="socialLogin('linkedin','user')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
            </a>
        </div>

        <!-- Social buttons (HR/company) -->
        <div class="social-btns" id="social-hr" style="display:none;">
            <a class="social-btn" href="#" onclick="socialLogin('google','hr')">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Google
            </a>
            <a class="social-btn" href="#" onclick="socialLogin('microsoft','hr')">
                <svg width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
                Microsoft
            </a>
        </div>

        <div class="switch-mode">
            <span id="mode-text">Don't have an account?</span>
            <span class="switch-link" id="mode-toggle" onclick="toggleMode()">Sign Up</span>
        </div>
    </div>

    <!-- Back to home -->
    <div class="back-home">
        <a href="index.html">← Back to Home</a>
    </div>

    <script src="auth.js"></script>
    <script>
        const EYE_OPEN = `👁️`;
        const EYE_CLOSED = `🙈`;

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.pw-toggle');
            if (!btn) return;
            const fieldId = btn.getAttribute('data-field');
            const input = document.getElementById(fieldId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = EYE_CLOSED;
            } else {
                input.type = 'password';
                btn.textContent = EYE_OPEN;
            }
        });

        // Social login stub — redirects to provider then back
        function socialLogin(provider, role) {
            localStorage.setItem('pendingSocialRole', role);

            if (provider === 'google') {
                // Use Google Identity Services popup — works on localhost
                if (typeof google === 'undefined') {
                    showError('Google SDK not loaded. Check your internet connection.'); return;
                }
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: '799801575257-4dru2cjini8d6rkb7j32tv6bga9rfla6.apps.googleusercontent.com',
                    scope: 'email profile',
                    callback: async (response) => {
                        if (response.error) { showError('Google sign-in cancelled.'); return; }
                        try {
                            const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                                headers: { Authorization: 'Bearer ' + response.access_token }
                            }).then(r => r.json());

                            const loginRes = await fetch('http://localhost:5000/api/auth/social-login', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ name: info.name, email: info.email, role, provider: 'google' })
                            });
                            const data = await loginRes.json();
                            if (loginRes.ok) {
                                localStorage.setItem('user', JSON.stringify(data.user));
                                localStorage.setItem('token', data.token);
                                localStorage.removeItem('pendingSocialRole');
                                window.location.href = role === 'hr' ? 'hr-dashboard.html' : 'candidate-dashboard.html';
                            } else {
                                showError(data.error || 'Login failed.');
                            }
                        } catch(e) {
                            showError('Google login failed. Try again.');
                        }
                    }
                });
                client.requestAccessToken();
                return;
            }

            if (provider === 'linkedin') { showError('LinkedIn login coming soon! Please try Google.'); return; }
            if (provider === 'microsoft') { showError('Microsoft login coming soon! Please try Google.'); return; }
        }

        // Toggle social panels based on role
        function updateSocialPanels(role) {
            document.getElementById('social-candidate').style.display = role === 'user' ? 'grid' : 'none';
            document.getElementById('social-hr').style.display       = role === 'hr'   ? 'grid' : 'none';
        }

        // Error display helper (used by auth.js override below)
        function showError(msg) {
            const box = document.getElementById('error-msg');
            document.getElementById('error-text').textContent = msg;
            box.classList.add('show');
        }

        function clearError() {
            document.getElementById('error-msg').classList.remove('show');
        }

        // Role UI updates (badge + colors)
        const _origSetRole = window.setRole;
        window.setRole = async function(newRole) {
            await _origSetRole(newRole);
            updateRoleUI(newRole);
        };

        function updateRoleUI(role) {
            const badge = document.getElementById('role-badge');
            const btn = document.getElementById('submit-btn');
            const candidateOpt = document.getElementById('role-candidate');
            const hrOpt = document.getElementById('role-hr');
            const loginCompany = document.getElementById('login-company-field');
            const isLogin = document.getElementById('submit-btn').innerText !== 'Sign Up';

            if (role === 'hr') {
                badge.textContent = '🏢 Company Login';
                badge.classList.add('hr-badge');
                btn.classList.add('hr-btn');
                candidateOpt.classList.remove('active');
                hrOpt.classList.add('active', 'hr-active');
                document.body.classList.add('body-hr');
                if (loginCompany) loginCompany.style.display = isLogin ? 'block' : 'none';
            } else {
                badge.textContent = '👤 Candidate Login';
                badge.classList.remove('hr-badge');
                btn.classList.remove('hr-btn');
                hrOpt.classList.remove('active', 'hr-active');
                candidateOpt.classList.add('active');
                document.body.classList.remove('body-hr');
                if (loginCompany) loginCompany.style.display = 'none';
            }
            updateSocialPanels(role);
        }

        // Intercept auth.js form submission to show inline errors
        document.getElementById('auth-form').addEventListener('submit', function() {
            clearError();
        }, true);

        // Patch alert to show inline errors instead
        const _nativeAlert = window.alert;
        window.alert = function(msg) {
            showError(msg);
        };

        // Hide forgot on signup
        const _origToggleMode = window.toggleMode;
        window.toggleMode = async function() {
            await _origToggleMode();
            const isSignup = document.getElementById('submit-btn').innerText === 'Sign Up';
            document.getElementById('forgot-wrap').style.display = isSignup ? 'none' : 'block';
            document.getElementById('role-selector-label').style.display = isSignup ? 'block' : 'none';
            // Show login-company only for HR in login mode
            const loginCompany = document.getElementById('login-company-field');
            const currentRole = document.getElementById('role-hr').classList.contains('active') ? 'hr' : 'user';
            if (loginCompany) loginCompany.style.display = (!isSignup && currentRole === 'hr') ? 'block' : 'none';
            clearError();
        };

        // Handle Google OAuth token callback
        (async function handleOAuthCallback() {
            const hash = window.location.hash;
            if (!hash.includes('access_token')) return;
            const params = new URLSearchParams(hash.substring(1));
            const token = params.get('access_token');
            if (!token) return;
            history.replaceState(null, '', window.location.pathname + window.location.search);
            try {
                const resp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const info = await resp.json();
                const role = localStorage.getItem('pendingSocialRole') || 'user';
                const loginRes = await fetch('http://localhost:5000/api/auth/social-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: info.name, email: info.email, role, provider: 'google' })
                });
                const data = await loginRes.json();
                if (loginRes.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    localStorage.removeItem('pendingSocialRole');
                    window.location.href = role === 'hr' ? 'hr-dashboard.html' : 'candidate-dashboard.html';
                } else {
                    showError(data.error || 'Social login failed.');
                }
            } catch(e) {
                showError('Google login failed. Please try again.');
            }
        })();
            const params = new URLSearchParams(window.location.search);
            const r = params.get('role') || 'user';
            updateRoleUI(r);
        //});
  
    </script>
</body>
</html>
